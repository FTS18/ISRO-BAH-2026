name: Deploy to Hugging Face Space

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install huggingface_hub

      - name: Push code to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          api.upload_folder(
              folder_path='.',
              repo_id='ananaydubey/mirr',
              repo_type='space',
              ignore_patterns=[
                  'venv312/*',
                  '.git/*',
                  '.vscode/*',
                  '*.pyc',
                  '__pycache__/*',
                  '.gemini/*',
                  'data/raw/*',
                  'data/processed/IMD_Rainfall_2015_2023.nc',
                  'data/processed/IMD_MaxTemp_2015_2023.nc',
                  'data/processed/IMD_MinTemp_2015_2023.nc',
                  'data/processed/IMD_Gridded_Rainfall_0.25_Real_v2.nc',
                  'data/processed/IMD_Gridded_Rainfall_0.25_Real_v3.nc',
                  'data/processed/temp_*'
              ]
          )
          "
